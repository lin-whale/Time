# GitHub Actions - Android APK 自动编译
# 
# 功能说明：
# - 每次 push 到 main 分支自动编译 APK
# - 编译成功后自动上传 APK 到 Release
# - 支持手动触发编译
#
# 使用方法：
# 1. 将此文件放到 .github/workflows/build.yml
# 2. push 代码到 GitHub
# 3. 在 Actions 页面查看编译进度
# 4. 编译完成后在 Releases 下载 APK

name: Build Android APK

on:
  # 推送到 main 分支时触发
  push:
    branches: [ main, master ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. 设置 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    # 3. 授予 Gradle 执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    # 4. 编译 Debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    # 5. 编译 Release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease
    
    # 6. 上传 Debug APK 作为 Artifact
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
    
    # 7. 上传 Release APK 作为 Artifact
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
    
    # 8. 获取版本信息（用于 Release 标题）
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
    
    # 9. 创建 Release 并上传 APK
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push'
      with:
        tag_name: v${{ steps.date.outputs.date }}
        name: "Time App Build ${{ steps.date.outputs.date }}"
        body: |
          ## 🚀 自动构建版本
          
          **构建时间:** ${{ steps.date.outputs.date }}
          **提交:** ${{ github.sha }}
          
          ### 📦 下载
          - `app-debug.apk` - 调试版（可直接安装）
          - `app-release-unsigned.apk` - 发布版（未签名）
          
          ### ⚠️ 注意
          Release APK 未签名，如需签名版请在本地使用 Android Studio 生成。
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
