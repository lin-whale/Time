name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
    
    - name: Sign APK
      run: |
        # 使用仓库中的 keystore 签名
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
          --ks app/timefly.keystore \
          --ks-key-alias timefly \
          --ks-pass pass:TimeFly2026Key \
          --key-pass pass:TimeFly2026Key \
          --out app/build/outputs/apk/release/Time-Fly.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Time-Fly
        path: app/build/outputs/apk/release/Time-Fly.apk
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push'
      with:
        tag_name: v${{ steps.date.outputs.date }}
        name: "Time-Fly v${{ steps.date.outputs.date }}"
        body: |
          ## 🚀 Time-Fly 自动构建
          
          **构建时间:** ${{ steps.date.outputs.date }}
          
          ### 📦 下载
          - **`Time-Fly.apk`** - 已签名，可直接安装和更新
          
          ### ⚠️ 安装提示
          如果提示"未知来源"，请在设置中允许安装。
        files: |
          app/build/outputs/apk/release/Time-Fly.apk
